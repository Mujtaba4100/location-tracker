<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📍 Victim Location - Rawalpindi, Punjab</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            padding: 20px;
            color: #00ff41;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #111;
            border-radius: 16px;
            padding: 25px;
            border: 1px solid #00ff41;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.05);
        }
        h1 {
            color: #00ff41;
            font-size: 22px;
            margin-bottom: 4px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }
        .subtitle {
            color: #666;
            font-size: 13px;
            margin-bottom: 15px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 10px;
        }
        .victim-badge {
            display: inline-block;
            background: #ff0044;
            color: white;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        #map {
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #00ff41;
            margin: 15px 0;
        }
        .info-box {
            background: #0a0a0a;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #1a1a1a;
            margin-top: 10px;
        }
        .info-box .row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 13px;
            border-bottom: 1px solid #0a0a0a;
        }
        .info-box .row:last-child {
            border-bottom: none;
        }
        .info-box .label {
            color: #666;
        }
        .info-box .value {
            color: #00ff41;
            font-weight: 600;
        }
        .danger {
            background: #1a0000;
            border: 1px solid #ff0044;
            border-radius: 10px;
            padding: 12px;
            margin-top: 15px;
            color: #ff0044;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }
        .footer {
            text-align: center;
            font-size: 10px;
            color: #333;
            margin-top: 15px;
            border-top: 1px solid #1a1a1a;
            padding-top: 10px;
        }
        .timestamp {
            color: #444;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 VICTIM LOCATION</h1>
        <div class="subtitle">
            <span class="victim-badge">🔴 LIVE TRACKING</span>
            <span style="color:#666; margin-left:10px;">Captured: 2026-06-30T10:36:24.719Z</span>
        </div>
        
        <div id="map"></div>
        
        <div class="info-box">
            <div class="row">
                <span class="label">📍 City</span>
                <span class="value">Rawalpindi, Punjab</span>
            </div>
            <div class="row">
                <span class="label">🌍 Country</span>
                <span class="value">PK</span>
            </div>
            <div class="row">
                <span class="label">📱 ISP</span>
                <span class="value">AS45773 PERN AS Content Servie Provider, Islamabad, Pakistan</span>
            </div>
            <div class="row">
                <span class="label">🎯 Accuracy</span>
                <span class="value">149 meters</span>
            </div>
            <div class="row">
                <span class="label">🔢 Coordinates</span>
                <span class="value">33.74799900600415, 73.14652641527164</span>
            </div>
            <div class="row">
                <span class="label">🔢 IP Address</span>
                <span class="value">111.68.96.42</span>
            </div>
            <div class="row">
                <span class="label">🕐 Time</span>
                <span class="value">2026-06-30T10:36:24.719Z</span>
            </div>
        </div>
        
        <div class="danger">
            ⚠️ VICTIM CLICKED THE LINK AND ALLOWED LOCATION
        </div>
        
        <div class="footer">
            Generated by GeoNews Weather Alert System<br>
            <span class="timestamp">File created: 2026-06-30T10:36:24.719Z</span>
        </div>
    </div>
    
    <script>
        var map = L.map('map').setView([33.74799900600415, 73.14652641527164], 17);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);
        
        var marker = L.marker([33.74799900600415, 73.14652641527164], {
            icon: L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowSize: [41, 41]
            })
        }).addTo(map);
        
        marker.bindPopup(`
            <b>🚨 VICTIM FOUND</b><br>
            📍 Rawalpindi, Punjab<br>
            🎯 149 meters accuracy
        `).openPopup();
        
        L.circle([33.74799900600415, 73.14652641527164], {
            color: '#ff0044',
            fillColor: '#ff0044',
            fillOpacity: 0.15,
            radius: 149
        }).addTo(map);
        
        setTimeout(() => {
            map.setView([33.74799900600415, 73.14652641527164], 18);
        }, 1000);
    <\/script>
</body>
</html>
